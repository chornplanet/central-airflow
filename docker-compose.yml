x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.0.2-python3.12}
  env_file:
    - .env
  environment: &airflow-common-env
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY:?Set AIRFLOW_API_SECRET_KEY in .env}
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: ${AIRFLOW_DAGS_ARE_PAUSED_AT_CREATION:-true}
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__CORE__EXECUTOR: SequentialExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:?Set AIRFLOW_FERNET_KEY in .env}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__STORE_SERIALIZED_DAGS: "true"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    AIRFLOW__LOGGING__DAG_PROCESSOR_MANAGER_LOG_LOCATION: /opt/airflow/logs/dag_processor_manager/dag_processor_manager.log
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY:?Set AIRFLOW_API_SECRET_KEY in .env}
  user: "${AIRFLOW_UID:-50000}:0"
  volumes:
    - central_airflow_home:/opt/airflow
    - ./dags:/opt/airflow/dags:ro
    - central_airflow_logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins:ro
  restart: unless-stopped

services:
  airflow-api-server:
    <<: *airflow-common
    container_name: central_airflow_api_server
    hostname: airflow-api-server
    command: api-server
    ports:
      - "${AIRFLOW_API_PORT:-8088}:8080"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v2/monitor/health', timeout=10).read()"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: central_airflow_scheduler
    hostname: airflow-scheduler
    command: scheduler
    healthcheck:
      test:
        - CMD-SHELL
        - airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    container_name: central_airflow_dag_processor
    hostname: airflow-dag-processor
    command: dag-processor
    healthcheck:
      test:
        - CMD-SHELL
        - airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    container_name: central_airflow_triggerer
    hostname: airflow-triggerer
    command: triggerer
    healthcheck:
      test:
        - CMD-SHELL
        - airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    container_name: central_airflow_init
    hostname: airflow-init
    restart: "no"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -euo pipefail

        python - <<'PY'
        import base64
        import os

        api_secret_key = os.environ.get("AIRFLOW_API_SECRET_KEY", "")
        admin_password = os.environ.get("AIRFLOW_ADMIN_PASSWORD", "")
        fernet_key = os.environ.get("AIRFLOW_FERNET_KEY", "")

        if not api_secret_key:
            raise SystemExit("AIRFLOW_API_SECRET_KEY is required. Set it in .env.")
        if not admin_password:
            raise SystemExit("AIRFLOW_ADMIN_PASSWORD is required. Set it in .env.")

        try:
            decoded_fernet_key = base64.urlsafe_b64decode(fernet_key.encode("utf-8"))
        except Exception as exc:
            raise SystemExit("AIRFLOW_FERNET_KEY must be a valid Fernet key. Generate one with: python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())'") from exc

        if len(decoded_fernet_key) != 32:
            raise SystemExit("AIRFLOW_FERNET_KEY must decode to exactly 32 bytes. Generate one with: python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())'")
        PY

        echo "Running Airflow metadata database migrations..."
        airflow db migrate

        echo "Creating Airflow admin user if needed..."
        airflow users create \
          --username "$${AIRFLOW_ADMIN_USERNAME:-admin}" \
          --password "$${AIRFLOW_ADMIN_PASSWORD:?Set AIRFLOW_ADMIN_PASSWORD in .env}" \
          --firstname "$${AIRFLOW_ADMIN_FIRSTNAME:-Central}" \
          --lastname "$${AIRFLOW_ADMIN_LASTNAME:-Admin}" \
          --role Admin \
          --email "$${AIRFLOW_ADMIN_EMAIL:-admin@example.com}" \
          || true

volumes:
  central_airflow_home:
  central_airflow_logs:
