services:
  airflow:
    image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.0.2-python3.12}
    container_name: central_airflow
    hostname: central-airflow
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY:?Set AIRFLOW_API_SECRET_KEY in .env}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: ${AIRFLOW_DAGS_ARE_PAUSED_AT_CREATION:-true}
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:?Set AIRFLOW_FERNET_KEY in .env}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY:?Set AIRFLOW_API_SECRET_KEY in .env}
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:?Set AIRFLOW_ADMIN_PASSWORD in .env}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@chornplanet.com}
      AIRFLOW_ADMIN_FIRSTNAME: ${AIRFLOW_ADMIN_FIRSTNAME:-Central}
      AIRFLOW_ADMIN_LASTNAME: ${AIRFLOW_ADMIN_LASTNAME:-Airflow}
    user: "${AIRFLOW_UID:-50000}:0"
    ports:
      - "${AIRFLOW_API_PORT:-8088}:8080"
    volumes:
      - central_airflow_home:/opt/airflow
      - ./dags:/opt/airflow/dags:ro
      - central_airflow_logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins:ro
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -euo pipefail

        airflow db migrate
        airflow users create \
          --username "$${AIRFLOW_ADMIN_USERNAME}" \
          --password "$${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname "$${AIRFLOW_ADMIN_FIRSTNAME}" \
          --lastname "$${AIRFLOW_ADMIN_LASTNAME}" \
          --role Admin \
          --email "$${AIRFLOW_ADMIN_EMAIL}" \
          || true

        exec airflow standalone
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v2/monitor/health', timeout=10).read()"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  central_airflow_home:
  central_airflow_logs:
